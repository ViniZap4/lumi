services:
  server:
    build: ./server
    ports:
      - "${LUMI_PORT:-8080}:8080"
    volumes:
      - "${NOTES_PATH:-./notes}:/notes"
    environment:
      - LUMI_ROOT=/notes
      - LUMI_PASSWORD=${LUMI_PASSWORD:-dev}
      - LUMI_PORT=8080
      - LUMI_SERVER_ID=${LUMI_SERVER_ID:-}
      - LUMI_PEERS=${LUMI_PEERS:-}
    restart: unless-stopped

  web:
    build:
      context: ./web-client
      args:
        VITE_LUMI_SERVER_URL: ${LUMI_SERVER_URL:-http://localhost:${LUMI_PORT:-8080}}
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - server
    restart: unless-stopped
